version: '3.8'

services:
  # ==========================================================================
  # Database - PostgreSQL
  # ==========================================================================
  db:
    image: postgres:15-alpine
    container_name: vehicle_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./backups:/backups  # For database backups
    environment:
      - POSTGRES_USER=${DB_USER:-vehicle_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vehicle_password}
      - POSTGRES_DB=${DB_NAME:-vehicle_db}
      - POSTGRES_PORT=${DB_PORT:-5432}
    ports:
      - "${DB_PORT:-5432}:5432"
    env_file:
      - .env
    networks:
      - vehicle_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vehicle_user} -d ${DB_NAME:-vehicle_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis - Caching and Session Storage
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: vehicle_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    env_file:
      - .env
    networks:
      - vehicle_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Django Application
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=${ENVIRONMENT:-development}
    container_name: vehicle_web
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      - DJANGO_SETTINGS_MODULE=data.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_NAME=${DB_NAME:-vehicle_db}
      - DB_USER=${DB_USER:-vehicle_user}
      - DB_PASSWORD=${DB_PASSWORD:-vehicle_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_TLS=True
      - ADMIN_URL=${ADMIN_URL:-admin-secret-path}
    env_file:
      - .env
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vehicle_network
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py create_admin --noinput --email admin@example.com --password Admin123! --first-name Admin --last-name User || true &&
        gunicorn data.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120 --access-logfile - --error-logfile -
      "

  # ==========================================================================
  # Nginx - Reverse Proxy and Static Files Server
  # ==========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: vehicle_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
      - ./ssl:/etc/nginx/ssl  # For HTTPS certificates
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - vehicle_network

  # ==========================================================================
  # Celery Worker - For Background Tasks (Optional)
  # ==========================================================================
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vehicle_celery
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=data.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DB_NAME=${DB_NAME:-vehicle_db}
      - DB_USER=${DB_USER:-vehicle_user}
      - DB_PASSWORD=${DB_PASSWORD:-vehicle_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vehicle_network
    command: celery -A data worker --loglevel=info

  # ==========================================================================
  # Celery Beat - For Scheduled Tasks (Optional)
  # ==========================================================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vehicle_celery_beat
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=data.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DB_NAME=${DB_NAME:-vehicle_db}
      - DB_USER=${DB_USER:-vehicle_user}
      - DB_PASSWORD=${DB_PASSWORD:-vehicle_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vehicle_network
    command: celery -A data beat --loglevel=info

  # ==========================================================================
  # Backup Service - Automated Database Backups (Optional)
  # ==========================================================================
  backup:
    image: postgres:15-alpine
    container_name: vehicle_backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      - POSTGRES_USER=${DB_USER:-vehicle_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vehicle_password}
      - POSTGRES_DB=${DB_NAME:-vehicle_db}
      - POSTGRES_HOST=db
    depends_on:
      - db
    networks:
      - vehicle_network
    entrypoint: |
      sh -c "
        while true; do
          DATE=\$(date +%Y%m%d_%H%M%S)
          PGPASSWORD=\$POSTGRES_PASSWORD pg_dump -h \$POSTGRES_HOST -U \$POSTGRES_USER \$POSTGRES_DB > /backups/backup_\$DATE.sql
          echo \"Backup created: backup_\$DATE.sql\"
          # Keep only last 7 days of backups
          find /backups -name 'backup_*.sql' -mtime +7 -delete
          sleep 86400  # Run daily
        done
      "

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

# ============================================================================
# Networks
# ============================================================================
networks:
  vehicle_network:
    driver: bridge